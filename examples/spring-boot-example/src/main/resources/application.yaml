server:
  port: 8080

spring:
  application:
    name: demo-service

x-registry:
  server-addr: 127.0.0.1:9848
  namespace: public
  group: DEFAULT_GROUP
  discovery:
    enabled: true
    register: true
    service-name: ${spring.application.name}
    port: ${server.port}
  config:
    enabled: true
