<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Registry Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; }
        .header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .version { margin-left: 12px; font-size: 12px; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 4px; }
        .layout { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
        .sidebar a { display: block; padding: 10px 24px; color: #555; text-decoration: none; font-size: 14px; }
        .sidebar a:hover, .sidebar a.active { background: #e6f7ff; color: #1890ff; border-right: 3px solid #1890ff; }
        .content { flex: 1; padding: 24px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 20px; text-align: center; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #1890ff; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; color: #555; }
        tr:hover td { background: #f5f5f5; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
        .toolbar input, .toolbar select { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .toolbar input { width: 240px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #1890ff; color: #fff; }
        .btn-primary:hover { background: #40a9ff; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .badge-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .badge-red { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .pagination { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        .pagination button { padding: 6px 12px; border: 1px solid #d9d9d9; background: #fff; border-radius: 4px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
        .detail-back { color: #1890ff; cursor: pointer; margin-bottom: 16px; display: inline-block; }
        pre { background: #f6f8fa; padding: 16px; border-radius: 4px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header">
        <h1>X-Registry</h1>
        <span class="version">v1.0.0</span>
    </div>
    <div class="layout">
        <nav class="sidebar">
            <a href="#" data-page="overview" class="active">Overview</a>
            <a href="#" data-page="services">Services</a>
            <a href="#" data-page="configs">Configurations</a>
            <a href="#" data-page="cluster">Cluster</a>
        </nav>
        <main class="content" id="app"></main>
    </div>
    <script>
        const API = '';
        let currentPage = 'overview';

        document.querySelectorAll('.sidebar a').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
                a.classList.add('active');
                currentPage = a.dataset.page;
                render();
            });
        });

        async function fetchJSON(url) {
            const res = await fetch(url);
            return res.json();
        }

        async function render() {
            const app = document.getElementById('app');
            switch(currentPage) {
                case 'overview': await renderOverview(app); break;
                case 'services': await renderServices(app); break;
                case 'configs': await renderConfigs(app); break;
                case 'cluster': await renderCluster(app); break;
            }
        }

        async function renderOverview(app) {
            const data = await fetchJSON(`${API}/v1/console/overview`);
            app.innerHTML = `
                <h2 style="margin-bottom:20px">Dashboard</h2>
                <div class="stats">
                    <div class="stat-card"><div class="value">${data.serviceCount}</div><div class="label">Services</div></div>
                    <div class="stat-card"><div class="value">${data.instanceCount}</div><div class="label">Instances</div></div>
                    <div class="stat-card"><div class="value">${data.healthyInstanceCount}</div><div class="label">Healthy</div></div>
                    <div class="stat-card"><div class="value">${data.subscriberCount}</div><div class="label">Subscribers</div></div>
                    <div class="stat-card"><div class="value">${data.memberCount}</div><div class="label">Cluster Nodes</div></div>
                    <div class="stat-card"><div class="value">${data.clusterMode}</div><div class="label">Mode</div></div>
                </div>
            `;
        }

        let svcPage = 0;
        async function renderServices(app, page) {
            if (page !== undefined) svcPage = page;
            const keyword = document.getElementById('svc-search')?.value || '';
            const data = await fetchJSON(`${API}/v1/console/services?page=${svcPage}&pageSize=20&keyword=${encodeURIComponent(keyword)}`);
            app.innerHTML = `
                <h2 style="margin-bottom:20px">Service List</h2>
                <div class="toolbar">
                    <input id="svc-search" placeholder="Search service name..." value="${keyword}">
                    <button class="btn btn-primary" onclick="renderServices(document.getElementById('app'), 0)">Search</button>
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>Service Name</th><th>Namespace</th><th>Group</th><th>Instances</th><th>Healthy</th></tr></thead>
                        <tbody>
                            ${data.services.map(s => `
                                <tr style="cursor:pointer" onclick="showServiceDetail('${s.namespace}','${s.group}','${s.serviceName}')">
                                    <td>${s.serviceName}</td>
                                    <td>${s.namespace}</td>
                                    <td>${s.group}</td>
                                    <td>${s.instanceCount}</td>
                                    <td><span class="badge ${s.healthyCount === s.instanceCount ? 'badge-green' : 'badge-red'}">${s.healthyCount}/${s.instanceCount}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="pagination">
                        <button ${svcPage === 0 ? 'disabled' : ''} onclick="renderServices(document.getElementById('app'), ${svcPage - 1})">Prev</button>
                        <span style="line-height:32px">Page ${svcPage + 1} / ${Math.max(1, Math.ceil(data.total / 20))}</span>
                        <button ${(svcPage + 1) * 20 >= data.total ? 'disabled' : ''} onclick="renderServices(document.getElementById('app'), ${svcPage + 1})">Next</button>
                    </div>
                </div>
            `;
        }

        async function showServiceDetail(ns, group, name) {
            const app = document.getElementById('app');
            const data = await fetchJSON(`${API}/v1/console/services/${ns}/${group}/${name}/instances`);
            app.innerHTML = `
                <span class="detail-back" onclick="renderServices(document.getElementById('app'))">&larr; Back to services</span>
                <h2 style="margin-bottom:20px">${name}</h2>
                <p style="margin-bottom:16px;color:#888">Namespace: ${ns} | Group: ${group} | Total: ${data.total}</p>
                <div class="card">
                    <table>
                        <thead><tr><th>IP</th><th>Port</th><th>Weight</th><th>Healthy</th><th>Ephemeral</th><th>Cluster</th></tr></thead>
                        <tbody>
                            ${data.instances.map(i => `
                                <tr>
                                    <td>${i.ip}</td>
                                    <td>${i.port}</td>
                                    <td>${i.weight}</td>
                                    <td><span class="badge ${i.healthy ? 'badge-green' : 'badge-red'}">${i.healthy ? 'Yes' : 'No'}</span></td>
                                    <td>${i.ephemeral ? 'Yes' : 'No'}</td>
                                    <td>${i.clusterName || 'DEFAULT'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        let cfgPage = 0;
        async function renderConfigs(app, page) {
            if (page !== undefined) cfgPage = page;
            const keyword = document.getElementById('cfg-search')?.value || '';
            const data = await fetchJSON(`${API}/v1/console/configs?page=${cfgPage}&pageSize=20&keyword=${encodeURIComponent(keyword)}`);
            app.innerHTML = `
                <h2 style="margin-bottom:20px">Configuration List</h2>
                <div class="toolbar">
                    <input id="cfg-search" placeholder="Search dataId..." value="${keyword}">
                    <button class="btn btn-primary" onclick="renderConfigs(document.getElementById('app'), 0)">Search</button>
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>Data ID</th><th>Namespace</th><th>Group</th><th>Type</th><th>Version</th><th>Last Modified</th></tr></thead>
                        <tbody>
                            ${data.configs.map(c => `
                                <tr style="cursor:pointer" onclick="showConfigDetail('${c.namespace}','${c.group}','${c.dataId}')">
                                    <td>${c.dataId}</td>
                                    <td>${c.namespace}</td>
                                    <td>${c.group}</td>
                                    <td>${c.contentType}</td>
                                    <td>${c.version}</td>
                                    <td>${new Date(c.lastModified).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="pagination">
                        <button ${cfgPage === 0 ? 'disabled' : ''} onclick="renderConfigs(document.getElementById('app'), ${cfgPage - 1})">Prev</button>
                        <span style="line-height:32px">Page ${cfgPage + 1} / ${Math.max(1, Math.ceil(data.total / 20))}</span>
                        <button ${(cfgPage + 1) * 20 >= data.total ? 'disabled' : ''} onclick="renderConfigs(document.getElementById('app'), ${cfgPage + 1})">Next</button>
                    </div>
                </div>
            `;
        }

        async function showConfigDetail(ns, group, dataId) {
            const app = document.getElementById('app');
            const data = await fetchJSON(`${API}/v1/console/configs/${ns}/${group}/${dataId}`);
            if (!data.found) {
                app.innerHTML = `<p>Config not found</p>`;
                return;
            }
            app.innerHTML = `
                <span class="detail-back" onclick="renderConfigs(document.getElementById('app'))">&larr; Back to configs</span>
                <h2 style="margin-bottom:20px">${dataId}</h2>
                <p style="margin-bottom:16px;color:#888">Namespace: ${ns} | Group: ${group} | Version: ${data.version} | MD5: ${data.md5}</p>
                <div class="card">
                    <h3 style="margin-bottom:12px">Content (${data.contentType})</h3>
                    <pre>${escapeHtml(data.content)}</pre>
                </div>
            `;
        }

        async function renderCluster(app) {
            const [health, members, leader] = await Promise.all([
                fetchJSON(`${API}/v1/cluster/health`),
                fetchJSON(`${API}/v1/cluster/members`),
                fetchJSON(`${API}/v1/cluster/leader`)
            ]);
            app.innerHTML = `
                <h2 style="margin-bottom:20px">Cluster</h2>
                <div class="stats">
                    <div class="stat-card"><div class="value">${health.status}</div><div class="label">Status</div></div>
                    <div class="stat-card"><div class="value">${health.mode}</div><div class="label">Mode</div></div>
                    <div class="stat-card"><div class="value">${health.memberCount}</div><div class="label">Members</div></div>
                    <div class="stat-card"><div class="value">${leader.leader || 'N/A'}</div><div class="label">Leader</div></div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom:12px">Members</h3>
                    <table>
                        <thead><tr><th>Address</th><th>State</th><th>gRPC Port</th><th>Distro Port</th><th>Raft Port</th></tr></thead>
                        <tbody>
                            ${members.members.map(m => `
                                <tr>
                                    <td>${m.address}</td>
                                    <td><span class="badge ${m.state === 'ALIVE' ? 'badge-green' : 'badge-red'}">${m.state}</span></td>
                                    <td>${m.grpcPort}</td>
                                    <td>${m.distroPort}</td>
                                    <td>${m.raftPort}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        render();
    </script>
</body>
</html>
